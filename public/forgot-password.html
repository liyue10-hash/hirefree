<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HireFree - Password Recovery</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="container" style="padding-top:36px;">
    <div class="admin-header">
      <div class="brand">
        <img class="brand-logo" src="/logo-mascot.png" alt="HireFree logo" />
        <span>HireFree Password Recovery</span>
      </div>
      <a class="tab" href="/">Back to Website</a>
    </div>

    <section id="notice" class="notice hidden"></section>

    <section class="form-card">
      <h2>Forgot password?</h2>
      <p class="admin-muted">Enter your registered email. For this MVP version, the admin will review the request and manually reset your password.</p>
      <form id="resetForm">
        <label>Email
          <input id="resetEmail" name="email" type="email" required placeholder="your@email.com" />
        </label>
        <button type="submit">Request Password Reset</button>
      </form>
      <p class="admin-muted">You may also email admin directly: <a href="mailto:hr@ameleco.com">hr@ameleco.com</a></p>
    </section>
  </main>

<script>
const notice = document.getElementById('notice');
document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  notice.className = 'notice hidden';
  const email = document.getElementById('resetEmail').value.trim();
  try {
    const r = await fetch('/api/password-reset-request', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(j.error || 'Request failed');
    notice.innerHTML = 'Password reset request received for <b>' + email.replace(/[&<>]/g, '') + '</b>. Admin will contact you or reset it shortly.';
    notice.className = 'notice';
    e.target.reset();
  } catch (err) {
    notice.textContent = err.message;
    notice.className = 'notice error';
  }
});
</script>
</body>
</html>
