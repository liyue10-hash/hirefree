<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>HireFree - Forgot Password</title><link rel="stylesheet" href="/styles.css"/></head><body><main class="container" style="padding-top:40px"><div class="brand" style="margin-bottom:24px"><img class="brand-logo" src="/logo-mascot.png" alt="HireFree"/><span>HireFree Password Recovery</span></div><form id="forgotForm" class="form-card"><h2>Forgot password?</h2><p class="desc">Enter your registered email. Admin will reset your password during MVP stage.</p><label>Email<input name="email" type="email" required placeholder="your@email.com"/></label><button type="submit">Request password reset</button><p><a href="/">Back to website</a></p></form><section id="notice" class="notice hidden"></section></main><script>document.getElementById('forgotForm').onsubmit=async e=>{e.preventDefault();const n=document.getElementById('notice');try{const r=await fetch('/api/password-request',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:new FormData(e.target).get('email')})});const j=await r.json();if(!r.ok)throw new Error(j.error||'Request failed');n.textContent='Password reset request submitted. Admin will contact you.';n.className='notice';e.target.reset();}catch(err){n.textContent=err.message;n.className='notice error';}};</script></body></html>
