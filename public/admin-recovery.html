<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HireFree Admin Recovery</title>
  <link rel="stylesheet" href="/styles.css"/>
</head>
<body>
<main class="container" style="padding-top:36px">
  <nav class="nav">
    <div class="brand">
      <img class="brand-logo" src="/logo-mascot.png" alt="HireFree logo"/>
      <span>HireFree Admin Recovery</span>
    </div>
    <a class="tab" href="/admin.html">Back to Admin Login</a>
  </nav>

  <section class="form-card" style="margin-top:28px">
    <h2>Email Admin Password Recovery</h2>
    <p class="desc">
      Enter your admin email to receive a verification code.
    </p>

    <label>
      Admin Email
      <input type="email" id="adminEmail" value="hr@ameleco.com"/>
    </label>

    <button id="sendCodeBtn" onclick="sendCode()">
      Send Email Verification Code
    </button>

    <form id="verifyForm" class="hidden" style="display:grid;gap:16px;margin-top:18px">
      <input type="hidden" id="requestId"/>

      <label>
        Email Verification Code
        <input
          id="emailCode"
          inputmode="numeric"
          maxlength="6"
          placeholder="6-digit code"
          required
        />
      </label>

      <label>
        New Admin Password
        <input
          id="newPassword"
          type="password"
          minlength="8"
          placeholder="Minimum 8 characters"
          required
        />
      </label>

      <button type="submit">Reset Admin Password</button>
    </form>

    <div id="msg" class="notice hidden" style="margin-top:16px"></div>

    <p class="desc">
      Recovery is secured through your registered admin email.
    </p>
  </section>
</main>

<script>
async function api(url, opts = {}) {
  const r = await fetch(url, opts);
  const j = await r.json().catch(() => ({}));

  if (!r.ok) {
    throw new Error(j.error || "Request failed");
  }

  return j;
}

function showMsg(text, error = false) {
  const m = document.getElementById("msg");
  m.className = "notice" + (error ? " error" : "");
  m.textContent = text;
}

async function sendCode() {
  try {
    const btn = document.getElementById("sendCodeBtn");
    btn.disabled = true;

    const email = document.getElementById("adminEmail").value;

    const r = await api("/api/admin-recovery/request", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email })
    });

    document.getElementById("requestId").value = r.requestId;

    document.getElementById("verifyForm").classList.remove("hidden");

    showMsg("Verification code sent to admin email successfully.");

  } catch (e) {
    showMsg(e.message, true);
  } finally {
    document.getElementById("sendCodeBtn").disabled = false;
  }
}

document.getElementById("verifyForm").addEventListener("submit", async e => {
  e.preventDefault();

  try {
    await api("/api/admin-recovery/verify", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        requestId: document.getElementById("requestId").value,
        emailCode: document.getElementById("emailCode").value,
        newPassword: document.getElementById("newPassword").value
      })
    });

    showMsg("Admin password reset successfully. Return to login.");

  } catch (err) {
    showMsg(err.message, true);
  }
});
</script>
</body>
</html>
