<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>HireFree Admin Recovery</title><link rel="stylesheet" href="/styles.css"/></head><body><main class="container" style="padding-top:36px"><nav class="nav"><div class="brand"><img class="brand-logo" src="/logo-mascot.png" alt="HireFree logo"/><span>HireFree Admin Recovery</span></div><a class="tab" href="/admin.html">Back to Admin Login</a></nav><section class="form-card" style="margin-top:28px"><h2>Two-Step Admin Password Recovery</h2><p class="desc" id="recoveryInfo">Loading recovery settings...</p><button id="sendCodesBtn" onclick="sendCodes()">Send Email + SMS Codes</button><form id="verifyForm" class="hidden" style="display:grid;gap:16px;margin-top:18px"><input type="hidden" id="requestId"/><label>Email verification code<input id="emailCode" inputmode="numeric" maxlength="6" placeholder="6-digit email code" required/></label><label>SMS verification code<input id="smsCode" inputmode="numeric" maxlength="6" placeholder="6-digit SMS code" required/></label><label>New admin password<input id="newPassword" type="password" minlength="8" placeholder="Minimum 8 characters" required/></label><button type="submit">Reset Admin Password</button></form><div id="msg" class="notice hidden" style="margin-top:16px"></div><p class="desc">For security, this page requires both email and SMS verification. If codes cannot be sent, configure SMTP and Twilio in Render Environment Variables.</p></section></main><script>
async function api(url,opts={}){const r=await fetch(url,opts);const j=await r.json().catch(()=>({}));if(!r.ok)throw new Error(j.error||'Request failed');return j;}
function showMsg(text,error=false){const m=document.getElementById('msg');m.className='notice'+(error?' error':'');m.textContent=text;}
async function loadConfig(){try{const c=await api('/api/admin-recovery/config');document.getElementById('recoveryInfo').innerHTML=`Codes will be sent to admin email <b>${c.email}</b> and phone <b>${c.phone}</b>.`; if(!c.emailProviderConfigured || !c.smsProviderConfigured){showMsg('Email/SMS provider is not fully configured in Render yet. Add SMTP and Twilio environment variables first.', true)}}catch(e){showMsg(e.message,true)}}
async function sendCodes(){try{document.getElementById('sendCodesBtn').disabled=true;const r=await api('/api/admin-recovery/request',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})});document.getElementById('requestId').value=r.requestId;document.getElementById('verifyForm').classList.remove('hidden');showMsg('Codes sent. Check your email and phone.');}catch(e){showMsg(e.message,true);document.getElementById('sendCodesBtn').disabled=false;}}
document.getElementById('verifyForm').addEventListener('submit',async e=>{e.preventDefault();try{await api('/api/admin-recovery/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({requestId:requestId.value,emailCode:emailCode.value,smsCode:smsCode.value,newPassword:newPassword.value})});showMsg('Admin password reset successfully. You can now return to Admin Login.');}catch(err){showMsg(err.message,true)}});
loadConfig();
</script></body></html>
