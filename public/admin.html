<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HireFree Admin</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<main class="container" style="padding-top:40px">
  <div class="brand" style="margin-bottom:24px">
    <img class="brand-logo" src="/logo-mascot.png" alt="HireFree logo">
    <span>HireFree Admin</span>
  </div>

  <section class="form-card">
    <h2>Admin Login</h2>
    <p class="desc">Authorized administrators only. Credentials are not displayed for security.</p>

    <form id="adminLoginForm">
      <label>Email
        <input type="email" id="email" required placeholder="hr@ameleco.com">
      </label>

      <label>Password
        <input type="password" id="password" required placeholder="Enter admin password">
      </label>

      <button type="submit">Login</button>
    </form>

    <p style="margin-top:16px">
      <a href="/admin-recovery.html">Forgot Admin Password?</a>
    </p>

    <div id="msg" class="notice hidden" style="margin-top:16px"></div>
  </section>
</main>

<script>
async function api(url, options = {}) {
  const r = await fetch(url, options);
  let j = {};
  try {
    j = await r.json();
  } catch(e) {}
  if (!r.ok) {
    throw new Error(j.error || 'Login failed');
  }
  return j;
}

function showMsg(text, error = false) {
  const msg = document.getElementById('msg');
  msg.textContent = text;
  msg.className = 'notice' + (error ? ' error' : '');
}

document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  try {
    const result = await api('/api/admin-login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        email,
        password
      })
    });

    if (result.ok) {
      window.location.href = '/admin-dashboard.html';
    } else {
      showMsg('Invalid credentials', true);
    }

  } catch(err) {
    showMsg(err.message, true);
  }
});
</script>
</body>
</html>
